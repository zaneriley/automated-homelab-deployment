---
# Inventory. Host-group structure defined by ADR-0001 and ADR-0002.
# Apple-specific roles run only on `workstations` (ADR-0008, ADR-0013).
all:
  children:
    workstations:
      hosts:
        mac-studio:
          ansible_connection: local
          ansible_python_interpreter: /usr/bin/python3
    nucs:
      hosts:
        star-caster:
          ansible_host: 192.168.11.13
          ansible_user: ansible
    nas:
      hosts: {}
    pis:
      hosts: {}
    # Lima rehearsal VMs (transient). Hosts are added at runtime by
    # scripts/rehearse-nuc.sh; the group skeleton lives here so
    # `ansible-inventory --graph` shows it and `group_vars/
    # nucs_rehearsal.{example.,}yml` has a documented home.
    nucs_rehearsal:
      hosts: {}
