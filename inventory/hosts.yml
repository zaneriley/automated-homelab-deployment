---
# Inventory. Host-group structure defined by ADR-0001 and ADR-0002.
# Apple-specific roles run only on `master` (ADR-0008).
all:
  children:
    master:
      hosts:
        mac-studio:
          ansible_connection: local
          ansible_python_interpreter: /usr/bin/python3
    nucs:
      hosts: {}
    nas:
      hosts: {}
    pis:
      hosts: {}
