---
# roles/workstation_tools/tasks/main.yml
# Default browser, AeroSpace runtime hint, and (in future) Colima on-demand
# config + 1Password CLI verify. Today: default-browser swap to Zen.
#
# AeroSpace + LuLu need TCC permission grants (Accessibility / Network
# Extension) that cannot be scripted on a SIP-on Mac — those are tracked
# in docs/runbooks/manual-steps.md. The bundle installs themselves are
# handled by the bootstrap role's brew bundle reconciliation.

# Stat Zen.app first so we fail loudly if the cask wasn't installed,
# rather than letting the `defaultbrowser zen` invocation return non-
# zero with no clear remediation.
- name: "Workstation_tools — verify Zen.app installed"
  ansible.builtin.stat:
    path: "/Applications/Zen.app"
  register: workstation_tools_zen_stat
  tags: [workstation_tools, default_browser]

- name: "Workstation_tools — fail if Zen.app missing"
  ansible.builtin.fail:
    msg: >-
      /Applications/Zen.app not found — `brew bundle` should install
      the `zen` cask. Re-run ./bootstrap.sh or `brew install --cask zen`.
  when: not workstation_tools_zen_stat.stat.exists
  tags: [workstation_tools, default_browser]

- name: "Workstation_tools — read current default browser"
  ansible.builtin.command:
    cmd: "/opt/homebrew/bin/defaultbrowser"
  register: workstation_tools_default_browser
  changed_when: false
  check_mode: false
  failed_when:
    - workstation_tools_default_browser.rc != 0
    - "'No such file or directory' not in (workstation_tools_default_browser.stderr | default(''))"
  tags: [workstation_tools, default_browser]

# `defaultbrowser` lists installed browsers as one-per-line, prefixing
# the current default with `* `. Pre-fix this used substring-in-stdout
# (`'* zen' not in stdout`) — fragile because `* zen-fast` would match
# `* zen` and falsely skip. Use stdout_lines + exact element match.
# An explicit `failed_when` on the apply ensures a non-zero exit
# (e.g. defaultbrowser can't HTTP-handler-bind the bundle) surfaces
# loudly instead of being reported as a successful change.
#
# Note: invoking `defaultbrowser zen` triggers a one-time macOS
# confirmation dialog ("Use Zen?") on the first run. Documented in
# docs/runbooks/manual-steps.md.
- name: "Workstation_tools — set Zen as default browser"
  ansible.builtin.command:
    cmd: "/opt/homebrew/bin/defaultbrowser zen"
  register: workstation_tools_set_browser
  when:
    - workstation_tools_zen_stat.stat.exists
    - workstation_tools_default_browser.stdout_lines is defined
    - "'* zen' not in workstation_tools_default_browser.stdout_lines"
  changed_when:
    - workstation_tools_set_browser.rc is defined
    - workstation_tools_set_browser.rc == 0
  failed_when:
    - workstation_tools_set_browser.rc is defined
    - workstation_tools_set_browser.rc != 0
  tags: [workstation_tools, default_browser]

# ---------- Obsidian — vault preflight ----------
# Obsidian.app is installed by the brew bundle (Brewfile cask "obsidian").
# The vault at workstation_tools_obsidian_vault_path is a private git repo that tracks its
# own .obsidian/ config + plugin binaries — the harness owns "app installed"
# and "vault present at canonical path", nothing else.
#
# Cloning the vault requires the 1Password SSH agent (KVM-driven Macs
# can't TouchID), so we surface the missing-vault state as a runbook
# step rather than try to clone declaratively. See
# docs/runbooks/manual-steps.md for the one-shot.

- name: "Workstation_tools — verify Obsidian vault is cloned"
  ansible.builtin.stat:
    path: "{{ workstation_tools_obsidian_vault_path }}"
  register: workstation_tools_obsidian_vault
  tags: [workstation_tools, obsidian]

- name: "Workstation_tools — fail if Obsidian vault missing"
  ansible.builtin.fail:
    msg: >-
      Obsidian vault not found at {{ workstation_tools_obsidian_vault_path }}.
      Clone it first (one-shot; see docs/runbooks/manual-steps.md):
        git clone git@github.com:zaneriley/obsidian-notes.git {{ workstation_tools_obsidian_vault_path }}
  when: not workstation_tools_obsidian_vault.stat.exists
  tags: [workstation_tools, obsidian]

# ---------- Agent surface — pai clone + Claude symlinks ----------
# Clone pai (Personal AI) and link Claude Code's expected paths into
# it. Claude Code reads ~/.claude/CLAUDE.md and ~/.claude/skills via
# the symlinks; other agentic tools read the .agents/ checkout direct.
#
# The HTTPS clone uses git's credential helper (configured once via
# `gh auth setup-git`; documented in docs/runbooks/manual-steps.md).
# If the helper isn't set up, the clone task hangs on a username
# prompt — the runbook step is the prereq.

# Stat first, then clone-if-missing. Mirrors the Zen + Obsidian
# preflight idiom in this role and sidesteps ansible.builtin.git's
# ambiguous URL-mismatch behavior on hosts where ~/.agents already
# exists with a non-HTTPS remote (e.g. the current master node uses
# git@github.com:zaneriley/pai). update: false keeps the task strictly
# "ensure cloned" — pulling latest pai is a separate concern (manual
# `git pull` or a future launchd timer).
- name: "Workstation_tools — stat pai clone"
  ansible.builtin.stat:
    path: "{{ workstation_tools_pai_clone_path }}/.git"
  register: workstation_tools_pai_clone_stat
  tags: [workstation_tools, agent_surface]

- name: "Workstation_tools — clone pai repo if missing"
  ansible.builtin.git:
    repo: "{{ workstation_tools_pai_repo_url }}"
    dest: "{{ workstation_tools_pai_clone_path }}"
    version: main
    update: false
  when: not workstation_tools_pai_clone_stat.stat.exists
  tags: [workstation_tools, agent_surface]

- name: "Workstation_tools — ensure ~/.claude directory exists"
  ansible.builtin.file:
    path: "{{ workstation_tools_claude_dir }}"
    state: directory
    mode: "0755"
  tags: [workstation_tools, agent_surface]

- name: "Workstation_tools — symlink ~/.claude/CLAUDE.md → pai AGENTS.md"
  ansible.builtin.file:
    src: "{{ workstation_tools_pai_clone_path }}/AGENTS.md"
    dest: "{{ workstation_tools_claude_dir }}/CLAUDE.md"
    state: link
    force: true
  tags: [workstation_tools, agent_surface]

- name: "Workstation_tools — symlink ~/.claude/skills → pai skills"
  ansible.builtin.file:
    src: "{{ workstation_tools_pai_clone_path }}/skills"
    dest: "{{ workstation_tools_claude_dir }}/skills"
    state: link
    force: true
  tags: [workstation_tools, agent_surface]

# settings.json is copied (not symlinked) because Claude Code rewrites
# the file via atomic-rename on session exit, which would replace any
# symlink with a regular file (anthropics/claude-code#40857) and also
# degrades permission lookups on every Bash call (#3575). The role is
# the canonical re-set: drift between sessions is expected; `make apply`
# returns to the pai-tracked baseline.
- name: "Workstation_tools — copy Claude Code settings.json from pai"
  ansible.builtin.copy:
    src: "{{ workstation_tools_pai_clone_path }}/claude-code/settings.json"
    dest: "{{ workstation_tools_claude_dir }}/settings.json"
    remote_src: true
    mode: "0644"
  tags: [workstation_tools, agent_surface]

- name: "Workstation_tools — ensure ~/.claude/hooks directory exists"
  ansible.builtin.file:
    path: "{{ workstation_tools_claude_dir }}/hooks"
    state: directory
    mode: "0755"
  tags: [workstation_tools, agent_surface]

# Hook script is a *file-level* symlink — Claude Code reads hook scripts
# but never writes them, so a symlink at this granularity is safe. A
# full ~/.claude/hooks/ directory symlink is reportedly broken
# (anthropics/claude-code#5433: hooks via symlinked dir hang or fail).
- name: "Workstation_tools — symlink ~/.claude/hooks/block-co-author.sh → pai hook"
  ansible.builtin.file:
    src: "{{ workstation_tools_pai_clone_path }}/claude-code/hooks/block-co-author.sh"
    dest: "{{ workstation_tools_claude_dir }}/hooks/block-co-author.sh"
    state: link
    force: true
  tags: [workstation_tools, agent_surface]
