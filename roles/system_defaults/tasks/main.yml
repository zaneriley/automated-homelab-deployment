---
# roles/system_defaults/tasks/main.yml
# Data-driven osx_defaults loop (ADR-0004). Each entry in
# system_defaults_entries (vars/main.yml) becomes one osx_defaults task.
# The module reads the current plist value before writing and only
# reports changed when it actually changed — this is how we earn the
# "second make check = 0 changes" correctness witness (ADR-0009).

- name: Apply managed defaults
  community.general.osx_defaults:
    domain: "{{ item.domain }}"
    key: "{{ item.key }}"
    type: "{{ item.type }}"
    value: "{{ item.value }}"
    state: present
  loop: "{{ system_defaults_entries }}"
  loop_control:
    label: "{{ item.domain }} {{ item.key }}"
  notify: Restart Dock   # reach for harden role's handler; safe across roles
                        # in the same play — Ansible handler scope is play-wide.
                        # Dock restart is cheap, so we pay for it on any
                        # osx_defaults change rather than split the loop.
  tags: [system_defaults]
