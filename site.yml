---
# Top-level playbook. Routes roles to host groups.
# Apple-specific roles run only on `workstations` (ADR-0008, ADR-0013, AGENTS.md §1 item 4).

- name: Workstations (Mac Studio master node, future workstation hosts)
  hosts: workstations
  # gather_facts: false — fact-gathering is deferred to the `bootstrap`
  # role's `setup` task, which runs *after* the Xcode Command Line Tools
  # preflight. Pre-fix, gather_facts: true ran `setup` before any role
  # tasks; on a truly fresh macOS the /usr/bin/python3 stub triggers a
  # GUI install dialog and `setup` fails opaquely before bootstrap's
  # helpful "run bootstrap.sh" preflight ever surfaces.
  gather_facts: false
  roles:
    - bootstrap
    - system_defaults
    - shell_env
    - harden
    - workstation_tools

- name: NUC fleet (placeholder — legacy NUC playbook still lives in legacy/ansible/setup_nuc.yml until the phase-2 refactor)
  hosts: nucs
  gather_facts: false
  tasks: []

- name: NAS (placeholder)
  hosts: nas
  gather_facts: false
  tasks: []

- name: Raspberry Pis (placeholder)
  hosts: pis
  gather_facts: false
  tasks: []
