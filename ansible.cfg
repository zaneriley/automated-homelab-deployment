[defaults]
inventory = inventory/hosts.yml
roles_path = roles
host_key_checking = True
retry_files_enabled = False
nocows = 1
result_format = yaml
check_mode_markers = true
any_errors_fatal = True
interpreter_python = /usr/bin/python3   ; pinned — Xcode CLT system Python is stable across brew upgrades (ADR-0009 idempotency witness depends on a stable interpreter)

[inventory]
enable_plugins = yaml, ini, auto

[ssh_connection]
pipelining = True
